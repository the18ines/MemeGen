<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Mème - MemeGen Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/creator.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-theater-masks logo-icon"></i>
                <h1>MemeGen Pro</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-arrow-left back-arrow"></i>
                    <span>Accueil</span>
                </a>
                <a href="creator.html" class="nav-link active">
                    <i class="fas fa-palette"></i>
                    <span>Créer</span>
                </a>
                <a href="gallery.html" class="nav-link">
                    <i class="fas fa-images"></i>
                    <span>Galerie</span>
                </a>
            </nav>
        </header>

        <main class="creator-main">
            <div class="creator-container">
                <aside class="creator-sidebar">
                    <div class="sidebar-section">
                        <h3 class="sidebar-title">
                            <i class="fas fa-upload"></i> Importer une Image
                        </h3>
                        <div class="upload-area" id="uploadArea">
                            <input type="file" id="imageInput" accept="image/*" hidden>
                            <div class="upload-content">
                                <div class="upload-icon"><i class="fas fa-image"></i></div>
                                <p>Cliquez ou glissez une image</p>
                                <span class="upload-hint">PNG, JPG, GIF jusqu'à 10MB</span>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <h3 class="sidebar-title">
                            <i class="fas fa-pen"></i> Texte du Haut
                        </h3>
                        <input type="text" id="topText" class="text-input" placeholder="Votre texte ici...">
                        <div class="control-group">
                            <label>Taille</label>
                            <input type="range" id="topTextSize" min="20" max="80" value="40" class="slider">
                        </div>
                        <div class="control-group">
                            <label>Couleur</label>
                            <input type="color" id="topTextColor" value="#ffffff" class="color-picker">
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <h3 class="sidebar-title">
                            <i class="fas fa-pen"></i> Texte du Bas
                        </h3>
                        <input type="text" id="bottomText" class="text-input" placeholder="Votre texte ici...">
                        <div class="control-group">
                            <label>Taille</label>
                            <input type="range" id="bottomTextSize" min="20" max="80" value="40" class="slider">
                        </div>
                        <div class="control-group">
                            <label>Couleur</label>
                            <input type="color" id="bottomTextColor" value="#ffffff" class="color-picker">
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <h3 class="sidebar-title">
                            <i class="fas fa-search-plus"></i> Recadrage & Zoom
                        </h3>
                        <div class="control-group">
                            <label>Zoom: <span id="zoomValue">100</span>%</label>
                            <input type="range" id="imageZoom" min="50" max="200" value="100" class="slider">
                        </div>
                        <button class="btn btn-outline" id="resetImageBtn" style="width: 100%; margin-top: 0.5rem;">
                            <i class="fas fa-undo"></i>
                            <span>Réinitialiser Image</span>
                        </button>
                    </div>

                    <div class="sidebar-section">
                        <h3 class="sidebar-title">
                            <i class="fas fa-palette"></i> Options Avancées
                        </h3>
                        <div class="control-group">
                            <label>
                                <input type="checkbox" id="textShadow" checked>
                                Ombre du texte
                            </label>
                        </div>
                        <div class="control-group">
                            <label>
                                <input type="checkbox" id="textOutline" checked>
                                Contour du texte
                            </label>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-primary" id="saveBtn">
                            <i class="fas fa-save"></i>
                            <span>Sauvegarder</span>
                        </button>
                        <button class="btn btn-secondary" id="downloadBtn">
                            <i class="fas fa-download"></i>
                            <span>Télécharger</span>
                        </button>
                        <button class="btn btn-outline" id="resetBtn">
                            <i class="fas fa-redo"></i>
                            <span>Réinitialiser</span>
                        </button>
                    </div>
                </aside>

                <div class="canvas-container">
                    <div class="canvas-wrapper">
                        <canvas id="memeCanvas"></canvas>
                        <div class="canvas-placeholder" id="canvasPlaceholder">
                            <div class="placeholder-icon"><i class="fas fa-paint-brush"></i></div>
                            <p>Importez une image pour commencer</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2025 MemeGen Pro - Créez des mèmes extraordinaires</p>
        </footer>
    </div>

    <script src="scripts/database.js"></script>
    <script src="scripts/creator.js"></script>
</body>
</html>
